# Single Motor Trainer - Threshold Configuration (3S LiPo)
# All values are SI units unless noted

battery:
  cell_count: 3                   # 3S LiPo
  nominal_voltage: 11.1           # V (3.7V * cells)
  min_voltage: 9.9                # V (3.3V/cell hard cutoff)
  warn_voltage: 10.5              # V (3.5V/cell warning)
  max_current: 18.0               # A (system burst limit)
  warn_current: 14.0              # A (system warning)
  max_dv_dt: -1.5                 # V/s (max allowed sag rate)
  soc_warn_percent: 20            # %
  soc_critical_percent: 10        # %
  capacity_mah: 3300              # mAh (for coulomb counting)
  i2c_address: 0x40
  shunt_ohms: 0.1                 # 100 mOhm shunt
  max_temp: 50                    # °C
  warn_temp: 45                   # °C

motors:
  count: 1
  max_current_per_motor: 15.0     # A
  warn_current_per_motor: 12.0    # A
  min_current_armed: 0.5          # A
  max_imbalance_ratio: 0.40
  i2c_addresses:
    - 0x41
  shunt_ohms: 0.1                 # 100 mOhm shunt

esc:
  max_temp: 80                    # °C
  warn_temp: 65                   # °C
  thermal_efficiency_baseline: 2.5
  thermal_efficiency_critical: 3.75

system:
  frequencies:
    battery: 50
    propulsion: 50
    imu: 50
    temperature: 5
  fast_loop_ms: 20                # 50 Hz sensor reading
  health_loop_ms: 200             # 5 Hz features, diagnostics, health
  log_interval_ms: 500            # 2 Hz DB logging
  fault_persistence_count: 3
  db_path: "data/flights/flight_monitor.db"
  log_level: "INFO"
  simulate: true
